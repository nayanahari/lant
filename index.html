<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="margin:0;">

    <model-viewer src="model.glb" ar ar-modes="scene-viewer quick-look webxr" ar-scale="auto" camera-controls
        auto-rotate style="width:100%; height:100vh;">

        <button slot="ar-button" style="
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    background:black;
    color:white;
    border-radius:8px;
    border:none;">
            👁 View in AR
        </button>

    </model-viewer>

</body>

</html>
