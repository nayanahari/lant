<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="margin:0; background:#000; overflow:hidden;">

    <!-- 🎵 Background Music -->
    <audio id="bgmusic" loop autoplay>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <!-- 🟡 Tap anywhere fallback for autoplay block -->
    <div onclick="startExperience()" style="
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:20;
"></div>

    <script>
        function startExperience() {
            const music = document.getElementById('bgmusic');
            music.play().catch(() => { });
        }
        window.addEventListener("load", startExperience);
    </script>

    <model-viewer src="model.glb" ar ar-modes="scene-viewer quick-look webxr" ar-scale="auto" camera-controls
        auto-rotate rotation-per-second="8deg" style="width:100%; height:100vh;">

        <button slot="ar-button" style="
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    background:white;
    color:black;
    border-radius:8px;
    border:none;
    font-weight:bold;">
            👁 View in AR
        </button>

    </model-viewer>

</body>

</html>
